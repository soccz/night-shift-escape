<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Night Shift Escape</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="title-stack">
          <p class="eyebrow">Protocol A-13</p>
          <h1>Night Shift Escape</h1>
          <p class="subtitle" id="subtitleText">브라우저용 애니 호러 솔로 디펜스 런.</p>
        </div>
        <div class="header-actions">
          <button id="languageButton" type="button">KO</button>
          <div class="theme-chip" id="themeChip">Cel Horror HUD</div>
          <button id="hudToggleButton" type="button">HUD</button>
          <button id="muteButton" type="button">사운드</button>
          <button id="pauseButton" type="button">일시정지</button>
          <button id="restartButton" type="button">다시 시작</button>
        </div>
      </header>

      <main class="layout">
        <section class="viewport">
          <div class="stage" id="gameStage">
            <div class="alarm-strip" id="alarmStrip">구역 상태 불안정. 확률이 곧 법칙이다.</div>
            <canvas id="gameCanvas" width="1360" height="820"></canvas>
            <div class="title-overlay" id="titleOverlay">
              <div class="title-card">
                <p class="title-kicker" id="titleKicker">Night Protocol</p>
                <h2 id="titleOverlayHeading">격리 구역 진입</h2>
                <p class="title-copy" id="titleOverlayCopy">
                  빈 방을 점거하고, 확률을 조작하듯 버티고, 정전을 견디고, 복도가 네 이름을 기억하기 전에 탈출하세요.
                </p>
                <button id="startButton" type="button">작전 시작</button>
              </div>
            </div>
            <div class="overlay-card" id="statusCard">
              <h2 id="missionHeading">임무 피드</h2>
              <p id="objectiveText"></p>
              <p id="promptText"></p>
            </div>
            <div class="hud-cluster hud-cluster-left">
              <section class="hud-panel hud-panel-player">
                <h2 id="runHeading">현재 런</h2>
                <div class="stats" id="stats"></div>
              </section>
            </div>
            <div class="hud-cluster hud-cluster-right">
              <section class="hud-panel hud-panel-log">
                <h2 id="logHeading">이벤트 로그</h2>
                <div class="log" id="log"></div>
              </section>
            </div>
            <div class="quick-help" id="quickHelpCard">
              <h2 id="helpHeading">빠른 도움말</h2>
              <p id="helpText"></p>
            </div>
            <div class="pause-overlay hidden" id="pauseOverlay">
              <div class="pause-card">
                <p class="title-kicker" id="pauseKicker">System Hold</p>
                <h2 id="pauseHeading">일시 정지</h2>
                <p id="pauseCopy">정비하고 다시 들어가세요.</p>
                <div class="pause-actions">
                  <button id="resumeButton" type="button">계속</button>
                  <button id="pauseMuteButton" type="button">사운드</button>
                </div>
              </div>
            </div>
            <div class="mobile-stick" id="mobileStick">
              <div class="stick-base">
                <div class="stick-ring"></div>
                <div class="stick-thumb" id="mobileStickThumb"></div>
              </div>
            </div>
            <div class="mobile-dock" id="mobileDock">
              <button id="dockModeButton" type="button">이동 전환</button>
              <button id="dockInteractButton" type="button">상호작용</button>
              <button id="dockReinforceButton" type="button">문 강화</button>
            </div>
          </div>
        </section>

        <aside class="sidebar" id="sidebar">
          <section class="panel">
            <h2 id="controlsHeading">조작</h2>
            <ul class="controls" id="controlsList"></ul>
          </section>

          <section class="panel">
            <h2 id="metaHeading">기록</h2>
            <div class="stats" id="meta"></div>
          </section>
        </aside>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
